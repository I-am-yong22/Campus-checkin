services:
  mysql:
    image: mysql:8.0
    container_name: campus-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: campus_checkin
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: campus-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://root:root123@mysql:3306/campus_checkin"
      JWT_SECRET: "prod-secret-change-me"
      JWT_EXPIRES_IN: "7d"
      PORT: 3000
      FACE_MATCH_THRESHOLD: 0.42
      CORS_ORIGIN: "http://localhost:8080"
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    container_name: campus-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mysql_data:
